name: Article I Pipeline

# Triggered every 30 min by the Cloudflare Worker at
# https://article1-cron.entrepreneurshiphacks.workers.dev (source in
# ../cron-worker/). GHA's own scheduled-trigger was silently dropping
# 4+ runs in 2-hour windows during peak load — Cloudflare cron triggers
# don't have that issue. The pipeline still runs HERE on GHA for the
# heavy lifting; only the scheduling moved.
#
# workflow_dispatch is kept so we can still trigger manually from the
# GitHub UI or CLI when needed.
on:
  workflow_dispatch:
    inputs:
      dry:
        description: 'Dry run (selector only, no generation)'
        required: false
        default: 'false'
      draft:
        description: 'Write to drafts/ instead of posts/'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PIPELINE_DRAFT_MODE: ${{ inputs.draft == 'true' && '1' || '0' }}
        run: |
          if [ "${{ inputs.dry }}" = "true" ]; then
            npm run pipeline:dry
          else
            npm run pipeline
          fi

      - name: Render Instagram-Story images for any new posts
        if: ${{ inputs.dry != 'true' && inputs.draft != 'true' }}
        run: |
          # Install Chrome on the runner. ubuntu-latest doesn't ship with
          # Chrome; setup-chrome is fast and cached.
          if ! command -v google-chrome >/dev/null 2>&1; then
            sudo apt-get update -qq
            wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt-get install -y -qq /tmp/chrome.deb
          fi
          # --since=4h matches the pipeline's RSS lookback window — we render
          # PNGs only for posts created in this cycle. We deliberately do NOT
          # backfill historical posts (200+ would blow past the 12-min step
          # timeout); the share button gracefully falls back to text-only
          # share when an image is missing.
          npm run og:stories -- --since=4h

      - name: Commit and push (if anything changed)
        run: |
          git config user.name "article1-bot"
          git config user.email "bot@article1.news"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          # Count new posts for commit message
          NEW_POSTS=$(git diff --cached --name-only --diff-filter=A | grep -c "src/content/posts/" || true)
          DRAFTS=$(git diff --cached --name-only --diff-filter=A | grep -c "src/content/drafts/" || true)
          MSG="[bot] $NEW_POSTS posts, $DRAFTS drafts ($(date -u +%Y-%m-%dT%H:%M))"
          git -c commit.gpgsign=false commit -m "$MSG"
          # Pull-rebase + retry to handle races with human pushes during the
          # ~3-minute generation window. The bot's commit replays on top of
          # any newly-arrived main.
          for attempt in 1 2 3; do
            if git -c rebase.autoStash=true pull --rebase origin main; then
              if git push; then
                echo "Push succeeded on attempt $attempt."
                exit 0
              fi
            fi
            echo "Attempt $attempt failed, retrying in 3s..."
            sleep 3
          done
          echo "All push attempts failed."
          exit 1
