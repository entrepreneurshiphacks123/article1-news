<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600;1,8..60,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --parchment: #FAFAF7;
    --parchment-2: #F5F4EE;
    --ink: #1A1A1A;
    --ink-2: #4A4A47;
    --ink-3: #76736C;
    --navy: #0A2540;
    --red: #9B1C1C;
    --hairline: #D4D2CD;
    --serif: 'Source Serif 4', 'Lora', 'Iowan Old Style', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body {
    background: var(--parchment);
    font-family: var(--serif);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    padding: 96px 88px;
    position: relative;
  }

  /* Top: brand mark + double rule */
  header {
    margin-bottom: 88px;
  }
  .top-rule {
    width: 100%;
    height: 5px;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    margin-bottom: 48px;
  }
  .brand-mark {
    font-family: var(--serif);
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 0.92;
    display: inline-flex;
    align-items: baseline;
    color: var(--ink);
    font-size: 88px;
  }
  .brand-mark .word { letter-spacing: 0.02em; }
  .brand-mark .roman {
    color: var(--red);
    font-style: italic;
    margin-left: 0.08em;
    position: relative;
    top: 0.06em;
    font-size: 132px;
  }

  /* Format eyebrow (CAROUSEL · 7 SLIDES, NUMBERS, etc.) */
  .eyebrow {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .eyebrow .label {
    color: var(--ink-2);
    font-weight: 600;
  }
  .eyebrow .label.red { color: var(--red); }
  .eyebrow .dot {
    width: 4px; height: 4px; border-radius: 999px; background: var(--ink-3);
  }

  /* Main slot — flex grow */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  /* Headline */
  .headline {
    font-family: var(--serif);
    font-weight: 700;
    color: var(--ink);
    font-size: 86px;
    line-height: 1.05;
    letter-spacing: -0.012em;
    text-wrap: balance;
    margin-bottom: 48px;
  }
  .headline.long { font-size: 70px; line-height: 1.1; }
  .headline.very-long { font-size: 60px; line-height: 1.12; }

  /* Excerpt */
  .excerpt {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: var(--ink-2);
    font-size: 38px;
    line-height: 1.4;
    text-wrap: pretty;
    max-width: 920px;
  }

  /* Quote-format variant: italic serif quote, big */
  .quote-block {
    border-left: 6px solid var(--red);
    padding: 12px 0 12px 40px;
    margin: 24px 0 36px;
  }
  .quote-text {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: var(--ink);
    font-size: 56px;
    line-height: 1.3;
    margin-bottom: 32px;
    text-wrap: pretty;
  }
  .quote-attrib {
    font-family: var(--serif);
    color: var(--ink-2);
    font-size: 30px;
    line-height: 1.4;
  }
  .quote-speaker {
    font-style: normal;
    font-weight: 600;
    color: var(--ink);
  }

  /* Numbers-format variant: huge red figure */
  .numbers-value {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 700;
    color: var(--red);
    font-size: 240px;
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 16px;
  }
  .numbers-unit {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 36px;
  }
  .numbers-body {
    font-family: var(--serif);
    font-size: 40px;
    line-height: 1.4;
    color: var(--ink);
    text-wrap: pretty;
    max-width: 920px;
  }

  /* Bottom: source attribution + brand domain */
  footer {
    margin-top: auto;
  }
  .source-line {
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 32px;
  }
  .source-line .outlet { color: var(--ink-2); font-weight: 500; }
  .bottom-rule {
    width: 100%;
    height: 5px;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    margin-bottom: 32px;
  }
  .footer-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 24px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .footer-row .domain {
    color: var(--ink);
    font-weight: 500;
  }
  .footer-row .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    letter-spacing: 0;
    text-transform: none;
    color: var(--ink-2);
  }

  /* "LINK IN BIO" sticker — IG Stories can't carry a programmatic link
     sticker via the Graph API, and this is the closest brand-safe stand-in:
     a paper-sticker-styled callout that visually reads as a tap target.
     Absolutely positioned, slightly rotated, with a drop shadow so it
     hovers above the page instead of looking baked-in. */
  .link-in-bio-sticker {
    position: absolute;
    bottom: 320px;
    right: 96px;
    background: var(--parchment);
    border: 6px solid var(--red);
    border-radius: 10px;
    padding: 22px 34px;
    font-family: var(--mono);
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    transform: rotate(-3.5deg);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.14);
    white-space: nowrap;
    z-index: 2;
  }
  .link-in-bio-sticker .arrow {
    color: var(--red);
    margin-right: 14px;
    display: inline-block;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <!-- "LINK IN BIO" sticker — visual stand-in for the link-sticker we
       can't add via the IG Graph API. -->
  <div class="link-in-bio-sticker">
    <span class="arrow">↗</span>LINK IN BIO
  </div>

  <!-- The renderer fills these with template literals based on post format. -->
  <header>
    <div class="top-rule"></div>
    <span class="brand-mark"><span class="word">Article</span><span class="roman">I</span></span>
  </header>

  <div class="eyebrow" id="eyebrow"></div>

  <main id="main">
    <!-- populated by renderer -->
  </main>

  <footer>
    <div class="source-line" id="source-line"></div>
    <div class="bottom-rule"></div>
    <div class="footer-row">
      <span class="domain">article1.news</span>
      <span class="tagline">Constitution. Long memory.</span>
    </div>
  </footer>
</body>
</html>
