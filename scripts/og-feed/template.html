<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600;1,8..60,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --parchment: #FAFAF7;
    --parchment-2: #F5F4EE;
    --ink: #1A1A1A;
    --ink-2: #4A4A47;
    --ink-3: #76736C;
    --navy: #0A2540;
    --red: #9B1C1C;
    --hairline: #D4D2CD;
    --serif: 'Source Serif 4', 'Lora', 'Iowan Old Style', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* 4:5 IG Feed format. 1080x1350 keeps a single ratio variant for feed
     and avoids the 1:1 crop. Source aspect for the Story (1080x1920) is
     too tall for feed — would crop top + bottom and clip our brand mark
     and footer. This template re-flows the same content into a shorter
     box with proportionally smaller padding + headline. */
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    background: var(--parchment);
    font-family: var(--serif);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    padding: 80px 72px 88px;
    position: relative;
  }

  /* Top: brand mark + double rule */
  header {
    margin-bottom: 48px;
  }
  .top-rule {
    width: 100%;
    height: 4px;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    margin-bottom: 32px;
  }
  .brand-mark {
    font-family: var(--serif);
    font-weight: 700;
    letter-spacing: 0.01em;
    line-height: 0.92;
    display: inline-flex;
    align-items: baseline;
    color: var(--ink);
    font-size: 66px;
  }
  .brand-mark .word { letter-spacing: 0.02em; }
  .brand-mark .roman {
    color: var(--red);
    font-style: italic;
    margin-left: 0.08em;
    position: relative;
    top: 0.06em;
    font-size: 100px;
  }

  /* Format eyebrow (BRIEF, CAROUSEL · 7 SLIDES, NUMBERS, etc.) */
  .eyebrow {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .eyebrow .label {
    color: var(--ink-2);
    font-weight: 600;
  }
  .eyebrow .label.red { color: var(--red); }
  .eyebrow .dot {
    width: 3px; height: 3px; border-radius: 999px; background: var(--ink-3);
  }

  /* Main slot — flex grow */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  /* Headline */
  .headline {
    font-family: var(--serif);
    font-weight: 700;
    color: var(--ink);
    font-size: 66px;
    line-height: 1.05;
    letter-spacing: -0.012em;
    text-wrap: balance;
    margin-bottom: 32px;
  }
  .headline.long { font-size: 56px; line-height: 1.08; }
  .headline.very-long { font-size: 48px; line-height: 1.12; }

  /* Excerpt */
  .excerpt {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: var(--ink-2);
    font-size: 30px;
    line-height: 1.4;
    text-wrap: pretty;
    max-width: 920px;
  }

  /* Quote-format variant: italic serif quote, big */
  .quote-block {
    border-left: 5px solid var(--red);
    padding: 8px 0 8px 32px;
    margin: 16px 0 24px;
  }
  .quote-text {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    color: var(--ink);
    font-size: 44px;
    line-height: 1.3;
    margin-bottom: 24px;
    text-wrap: pretty;
  }
  .quote-attrib {
    font-family: var(--serif);
    color: var(--ink-2);
    font-size: 24px;
    line-height: 1.4;
  }
  .quote-speaker {
    font-style: normal;
    font-weight: 600;
    color: var(--ink);
  }

  /* Numbers-format variant: huge red figure */
  .numbers-value {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 700;
    color: var(--red);
    font-size: 180px;
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin: 0 0 12px;
  }
  .numbers-unit {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 28px;
  }
  .numbers-body {
    font-family: var(--serif);
    font-size: 32px;
    line-height: 1.4;
    color: var(--ink);
    text-wrap: pretty;
    max-width: 920px;
  }

  /* Bottom: source attribution + brand domain */
  footer {
    margin-top: auto;
  }
  .source-line {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 24px;
  }
  .source-line .outlet { color: var(--ink-2); font-weight: 500; }
  .bottom-rule {
    width: 100%;
    height: 4px;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    margin-bottom: 24px;
  }
  .footer-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 20px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .footer-row .domain {
    color: var(--ink);
    font-weight: 500;
  }
  .footer-row .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0;
    text-transform: none;
    color: var(--ink-2);
  }

  /* Carousel slide indicator (1/7, 2/7, etc.) — only renders when set */
  .slide-counter {
    position: absolute;
    top: 72px;
    right: 72px;
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.16em;
    color: var(--ink-3);
  }
</style>
</head>
<body>
  <!-- The renderer fills these with template literals based on post format. -->
  <span class="slide-counter" id="slide-counter"></span>

  <header>
    <div class="top-rule"></div>
    <span class="brand-mark"><span class="word">Article</span><span class="roman">I</span></span>
  </header>

  <div class="eyebrow" id="eyebrow"></div>

  <main id="main">
    <!-- populated by renderer -->
  </main>

  <footer>
    <div class="source-line" id="source-line"></div>
    <div class="bottom-rule"></div>
    <div class="footer-row">
      <span class="domain">article1.news</span>
      <span class="tagline">Constitution. Long memory.</span>
    </div>
  </footer>
</body>
</html>
